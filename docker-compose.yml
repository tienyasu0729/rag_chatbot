name: rag-chatbot-stack

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-chatbot-qdrant
    env_file:
      - ./deploy/env/qdrant.env
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    networks:
      - rag_network

  redis:
    image: redis:7-alpine
    container_name: rag-chatbot-redis
    env_file:
      - ./deploy/env/redis.env
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command:
      - sh
      - -c
      - >
        exec redis-server
        --appendonly $${REDIS_APPENDONLY:-yes}
        --port $${REDIS_PORT:-6379}
        $${REDIS_PASSWORD:+--requirepass "$${REDIS_PASSWORD}"}
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -p "$${REDIS_PORT:-6379}" $${REDIS_PASSWORD:+-a "$${REDIS_PASSWORD}"} ping | grep PONG
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - rag_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-chatbot-app:latest
    container_name: rag-chatbot-app
    env_file:
      - ./deploy/env/app.env
    command:
      - sh
      - -c
      - python -m app.bootstrap && uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    restart: unless-stopped
    networks:
      - rag_network

volumes:
  qdrant_data:
  redis_data:

networks:
  rag_network:
    driver: bridge

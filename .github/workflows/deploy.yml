
name: Deploy RAG Chatbot

on:

  push:

    branches: [main]

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - uses: appleboy/ssh-action@v1.0.3

        with:

          host: ${{ secrets.HOST }}

          username: ${{ secrets.USERNAME }}

          key: ${{ secrets.SSH_KEY }}

          port: ${{ secrets.PORT }}

          command_timeout: 10m

          script: |

            cd /opt/rag-chatbot/app && git reset --hard && git pull origin main && source /opt/rag-chatbot/venv/bin/activate && pip install -r requirements.txt --quiet && systemctl restart rag-chatbot


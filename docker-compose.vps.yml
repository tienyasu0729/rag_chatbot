services:
  qdrant:
    image: qdrant/qdrant:v1.9.5
    container_name: rag-chatbot-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"

  redis:
    image: redis:7.4-alpine
    container_name: rag-chatbot-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command:
      - sh
      - -c
      - >
        exec redis-server
        --appendonly yes
        --port 6379
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -p 6379 ping | grep PONG"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    image: vnam1401/rag-chatbot-app:latest
    container_name: rag-chatbot-app
    restart: unless-stopped
    env_file:
      - ./deploy/env/app.vps.env
    environment:
      TZ: Asia/Saigon
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  qdrant_data:
  redis_data:
